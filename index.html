<html>
  <head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sky" src="Assets/img/everest.jpg">
        <img id="beach" src="Assets/img/beach.jpg">
        <a-asset-item id="building" src="Assets/model/empiresb.glb"></a-asset-item>
      </a-assets>
      
      <a-sky src="#sky"></a-sky>
      <a-plane src="#beach" rotation="-90 0 0" width="20" height="20"></a-plane>

      <a-entity
        text="value: Hello!; color: #FFD500; align: center"
        position="0 3 -4"
        scale="6 6 6">
      </a-entity>  

      <a-entity 
  gltf-model="#building" 
  position="0 2 -4" 
  scale="0.5 0.5 0.5">
</a-entity>

      <a-light type="point" intensity="2" position="2 4 4"></a-light>
    </a-scene>
  </body>
</html>
